rag_task:
  description: >
    Search the local Milvus vector database for document chunks relevant to
    the query: {query}
    Return the top 5 most relevant chunks with their source names and content.
    If no documents are indexed, clearly state that.
  expected_output: >
    A structured list of relevant document passages. Each passage should include:
    the source document name, a relevance note, and the extracted text.
    If no documents are indexed, state: "No documents indexed yet."
  agent: rag_agent

memory_task:
  description: >
    Search the user's Zep memory store for prior research sessions and
    conversation history related to: {query}
    Retrieve the most relevant historical context including dates and key findings.
  expected_output: >
    A summary of relevant prior research sessions and conversation history.
    Include dates and key findings. If no memory exists, state: "No prior
    memory found for this user."
  agent: memory_agent

web_search_task:
  description: >
    Use Firecrawl to search the web for current information about: {query}
    Focus on authoritative sources, recent content, and factual information.
    Retrieve and extract content from the top 3 results.
  expected_output: >
    Extracted content from up to 3 web sources. For each source include:
    the URL, title, and the key relevant passage (up to 800 characters).
    Focus on factual, citable content.
  agent: web_search_agent

arxiv_task:
  description: >
    Search arXiv for the most relevant academic papers about: {query}
    Find up to 5 papers with strong relevance. Extract title, authors,
    arXiv URL, and key findings from each abstract.
  expected_output: >
    A list of up to 5 arXiv papers. For each paper include: title, authors,
    arXiv URL, and a 2-3 sentence summary of key findings relevant to the query.
  agent: arxiv_agent
